<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52" width="52" height="52">
  <defs>
    <linearGradient id="fav-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5044E5" />
      <stop offset="100%" stop-color="#12B7AC" />
    </linearGradient>
  </defs>
  
  <!-- Base shadow/glow -->
  <polygon points="26,1 48,13.5 48,38.5 26,51 4,38.5 4,13.5" fill="url(#fav-grad)" opacity="0.08" />
  
  <!-- Outer Hexagon border with rounded corners -->
  <polygon points="26,3 46,14.5 46,37.5 26,49 6,37.5 6,14.5" fill="none" stroke="url(#fav-grad)" stroke-width="3.5" stroke-linejoin="round" />
  
  <!-- Internal Connections -->
  <line x1="26" y1="3" x2="26" y2="20" stroke="url(#fav-grad)" stroke-width="2.5" />
  <line x1="6" y1="14.5" x2="26" y2="26" stroke="url(#fav-grad)" stroke-width="2.5" />
  <line x1="46" y1="14.5" x2="26" y2="26" stroke="url(#fav-grad)" stroke-width="2.5" />
  <line x1="26" y1="26" x2="26" y2="49" stroke="url(#fav-grad)" stroke-width="2.5" />
  <line x1="6" y1="37.5" x2="26" y2="26" stroke="url(#fav-grad)" stroke-width="2.5" />
  <line x1="46" y1="37.5" x2="26" y2="26" stroke="url(#fav-grad)" stroke-width="2.5" />
  
  <!-- Central Spark/Node -->
  <circle cx="26" cy="26" r="6" fill="url(#fav-grad)" stroke="#FFFFFF" stroke-width="2" />
  
  <!-- Outer Nodes -->
  <circle cx="26" cy="3" r="3.5" fill="#5044E5" />
  <circle cx="46" cy="14.5" r="3.5" fill="#12B7AC" />
  <circle cx="6" cy="14.5" r="3.5" fill="#5044E5" />
  <circle cx="46" cy="37.5" r="3.5" fill="#12B7AC" />
  <circle cx="6" cy="37.5" r="3.5" fill="#5044E5" />
  <circle cx="26" cy="49" r="3.5" fill="#12B7AC" />
</svg>
