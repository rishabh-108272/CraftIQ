<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <!-- Primary Gradients -->
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5044E5" />
      <stop offset="100%" stop-color="#12B7AC" />
    </linearGradient>
    <linearGradient id="text-iq-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5044E5" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    
    <!-- Styling -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800;900&amp;display=swap');
      .logo-text-craft {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-weight: 800;
        fill: #1F2937; /* Clean charcoal/gray-900 */
        font-size: 28px;
        letter-spacing: -0.5px;
      }
      .logo-text-iq {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-weight: 900;
        fill: url(#text-iq-grad);
        font-size: 28px;
        letter-spacing: -0.2px;
      }
    </style>
  </defs>
  
  <!-- Icon Group: stylized 3D Hexagon for "Craft" + "IQ" Nodes -->
  <g transform="translate(8, 6)">
    <!-- Base stylized isometric grid hex shadow/glow -->
    <polygon points="24,2 45,14 45,38 24,50 3,38 3,14" fill="url(#icon-grad)" opacity="0.08" />
    
    <!-- Outer Hex skeleton with round join -->
    <polygon points="24,5 42,15 42,36 24,46 6,36 6,15" fill="none" stroke="url(#icon-grad)" stroke-width="3" stroke-linejoin="round" />
    
    <!-- Internal connections representing intelligence/nodes -->
    <line x1="24" y1="5" x2="24" y2="19" stroke="url(#icon-grad)" stroke-width="2" />
    <line x1="6" y1="15" x2="24" y2="25" stroke="url(#icon-grad)" stroke-width="2" />
    <line x1="42" y1="15" x2="24" y2="25" stroke="url(#icon-grad)" stroke-width="2" />
    <line x1="24" y1="25" x2="24" y2="46" stroke="url(#icon-grad)" stroke-width="2" />
    <line x1="6" y1="36" x2="24" y2="25" stroke="url(#icon-grad)" stroke-width="2" />
    <line x1="42" y1="36" x2="24" y2="25" stroke="url(#icon-grad)" stroke-width="2" />
    
    <!-- Central Brain Node / Spark -->
    <circle cx="24" cy="25" r="5.5" fill="url(#icon-grad)" stroke="#FFFFFF" stroke-width="2" />
    
    <!-- Peripheral intelligence nodes -->
    <circle cx="24" cy="5" r="3.5" fill="#5044E5" />
    <circle cx="42" cy="15" r="3.5" fill="#12B7AC" />
    <circle cx="6" cy="15" r="3.5" fill="#5044E5" />
    <circle cx="42" cy="36" r="3.5" fill="#12B7AC" />
    <circle cx="6" cy="36" r="3.5" fill="#5044E5" />
    <circle cx="24" cy="46" r="3.5" fill="#12B7AC" />
  </g>
  
  <!-- Text Group -->
  <text x="66" y="39">
    <tspan class="logo-text-craft">Craft</tspan><tspan class="logo-text-iq">IQ</tspan>
  </text>
</svg>
